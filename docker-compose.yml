services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: atlas
      POSTGRES_PASSWORD: atlas
      POSTGRES_DB: atlasml
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      PYTHONPATH: /app
    depends_on:
      - postgres
      - redis
    volumes:
      - ./artifacts:/app/artifacts
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  worker:
    build: .
    env_file: .env
    environment:
      PYTHONPATH: /app
    depends_on:
      - postgres
      - redis
    volumes:
      - ./artifacts:/app/artifacts
    command: rq worker --url ${REDIS_URL:-redis://redis:6379}

volumes:
  pgdata:
